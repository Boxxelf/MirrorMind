<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MirrorMind</title>
  <link rel="stylesheet" href="sidebar.css">
</head>
<body>
  <div class="mm-sidebar">

    <!-- Header -->
    <div class="mm-header">
      <div class="mm-logo">
        <div class="mm-logo-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="white" stroke-width="2" stroke-linejoin="round"/>
            <path d="M2 17L12 22L22 17" stroke="white" stroke-width="2" stroke-linejoin="round"/>
            <path d="M2 12L12 17L22 12" stroke="white" stroke-width="2" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="mm-logo-text">MirrorMind</span>
      </div>
      <div class="mm-powered">Powered by Azure OpenAI</div>
    </div>

    <!-- Mode Selector -->
    <div class="mm-modes">
      <button class="mm-mode-btn active" data-mode="bias">
        <svg class="mm-mode-icon" width="15" height="15" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M5 6h3M5 8h2" stroke="currentColor" stroke-width="1.25" stroke-linecap="round"/>
        </svg>
        <span>Bias Check</span>
      </button>
      <button class="mm-mode-btn" data-mode="summarize">
        <svg class="mm-mode-icon" width="15" height="15" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="1.5" width="12" height="13" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M5 6h6M5 8.5h6M5 11h3.5" stroke="currentColor" stroke-width="1.25" stroke-linecap="round"/>
        </svg>
        <span>Summarize</span>
      </button>
      <button class="mm-mode-btn" data-mode="simplify">
        <svg class="mm-mode-icon" width="15" height="15" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M9.5 1.5L4 8.5h4.5L6 14.5l8-7.5H9.5l1-5.5z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
        </svg>
        <span>Simplify</span>
      </button>
      <button class="mm-mode-btn" data-mode="question">
        <svg class="mm-mode-icon" width="15" height="15" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M13.5 2.5h-11a1 1 0 0 0-1 1v7a1 1 0 0 0 1 1h3L8 14l2.5-2.5h3a1 1 0 0 0 1-1v-7a1 1 0 0 0-1-1z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          <path d="M6.5 5.5a1.5 1.5 0 0 1 3 0c0 1-1.5 1.5-1.5 2M8 9.5v.1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span>Questions</span>
      </button>
    </div>

    <!-- Selected Text Preview -->
    <div class="mm-selection-preview" id="selectionPreview">
      <div class="mm-preview-label">Selected text</div>
      <div class="mm-preview-text" id="previewText">
        Select any text on the page to analyze it
      </div>
    </div>

    <!-- Analyze Button -->
    <button class="mm-analyze-btn" id="analyzeBtn" disabled>
      Analyze Selected Text
    </button>

    <!-- Results -->
    <div class="mm-results" id="results">
      <div class="mm-empty-state" id="emptyState">
        <div class="mm-empty-icon">
          <svg width="44" height="44" viewBox="0 0 48 48" fill="none" stroke="currentColor" xmlns="http://www.w3.org/2000/svg">
            <rect x="6" y="4" width="26" height="32" rx="2.5" stroke-width="2"/>
            <path d="M12 14h14M12 19h14M12 24h9" stroke-width="2" stroke-linecap="round"/>
            <circle cx="35" cy="37" r="7" stroke-width="2"/>
            <path d="M40.5 42.5L44 46" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
        </div>
        <p>Select text on any webpage and click Analyze to get started</p>
      </div>

      <div class="mm-loading" id="loading" style="display:none">
        <div class="mm-loading-dots">
          <span></span><span></span><span></span>
        </div>
        <p>Analyzing with Azure OpenAI...</p>
      </div>

      <div class="mm-output" id="output" style="display:none">
        <div class="mm-output-header">
          <span class="mm-output-label" id="outputLabel">Bias Analysis</span>
          <button class="mm-copy-btn" id="copyBtn">Copy</button>
        </div>
        <div class="mm-output-content" id="outputContent"></div>
      </div>
    </div>

    <!-- Footer -->
    <div class="mm-footer">
      <span>Built with Azure OpenAI &middot; SEP x Microsoft Hackathon 2026</span>
    </div>

  </div>

  <script src="sidebar.js"></script>
</body>
</html>
